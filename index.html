<div id="page-mail" class="page" style="width: 100%; display: flex; justify-content: center; align-items: center; padding: 20px 0; background: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
    <div class="luxury-card" style="background: #ffffff; width: 100%; max-width: 520px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); padding: 35px; border: 1px solid rgba(0,0,0,0.02); color: #333;">
        
        <div style="text-align: center; margin-bottom: 25px;">
            <div style="font-size: 38px; margin-bottom: 8px;">🔮</div>
            <h2 style="font-size: 26px; font-weight: 800; color: #0f172a; letter-spacing: -0.5px; margin-bottom: 4px;">FB & IG OTP Extractor</h2>
            <p style="font-size: 13px; color: #64748b; font-weight: 500;">Facebook & Instagram Verification Code Extractor</p>
        </div>

        <div style="display: flex; justify-content: center; margin-bottom: 25px;">
            <div id="modeBadge" style="background: #fffbeb; border: 1px solid #fef3c7; color: #d97706; padding: 8px 24px; border-radius: 50px; font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 6px; box-shadow: 0 2px 6px rgba(217,119,6,0.05);">
                ⭐ FACEBOOK PRIORITY MODE
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px;">
            <button id="tab-fb" onclick="setMailMode('facebook')" style="background: #2563eb; color: #ffffff; border: none; padding: 14px; border-radius: 14px; font-weight: 700; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 12px rgba(37,99,235,0.2); transition: all 0.2s;">
                Facebook <span style="background: #f59e0b; color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 6px; font-weight: 800;">1st</span>
            </button>
            <button id="tab-ig" onclick="setMailMode('instagram')" style="background: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; padding: 14px; border-radius: 14px; font-weight: 600; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s;">
                📷 Instagram <span id="igBadgeLabel" style="background: #cbd5e1; color: #64748b; font-size: 10px; padding: 2px 6px; border-radius: 6px; font-weight: 700;">2nd</span>
            </button>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px;">
            <div style="background: #f8fafc; border: 1px solid #e2e8f0; padding: 10px; border-radius: 14px; text-align: center; font-size: 13px; font-weight: 600; color: #2563eb; display: flex; align-items: center; justify-content: center; gap: 6px;">
                👤 Account 1
            </div>
            <div style="background: #f8fafc; border: 1px solid #e2e8f0; padding: 10px; border-radius: 14px; text-align: center; font-size: 13px; font-weight: 600; color: #a855f7; display: flex; align-items: center; justify-content: center; gap: 6px;">
                🔮 Account 2
            </div>
        </div>

        <div style="border-left: 3px solid #0f172a; border-right: 3px solid #0f172a; padding: 0 4px; margin-bottom: 25px; border-radius: 4px;">
            <div style="font-size: 11px; font-weight: 800; color: #334155; margin-bottom: 8px; padding-left: 6px; letter-spacing: 0.5px; text-transform: uppercase;">📋 Paste your email data here:</div>
            <textarea id="mailInputData" placeholder="Format: email|password|token|uuid" style="width: 100%; height: 120px; padding: 14px; border: 1px solid #e2e8f0; border-radius: 14px; font-size: 13px; color: #334155; background: #ffffff; font-family: 'Courier New', monospace; resize: none; box-shadow: inset 0 2px 4px rgba(0,0,0,0.01); outline: none; line-height: 1.5;"></textarea>
        </div>

        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 12px; margin-bottom: 25px;">
            <button id="startMailBtn" onclick="startMailProcessor()" style="background: #0f172a; color: #ffffff; border: none; padding: 15px; border-radius: 14px; font-size: 13px; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 12px rgba(15,23,42,0.15);">
                🔍 Extract OTP Code
            </button>
            <button onclick="clearMailTool()" style="background: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; padding: 15px; border-radius: 14px; font-size: 13px; font-weight: 800; cursor: pointer; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 6px;">
                🗑️ Clear
            </button>
        </div>

        <div id="mailStatusAlertBox" style="background: #f8fafc; border: 1px solid #e2e8f0; border-left: 4px solid #cbd5e1; border-radius: 16px; padding: 16px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; transition: all 0.3s;">
            <div style="flex: 1; padding-right: 10px;">
                <div id="mailStatusTitle" style="font-size: 13px; font-weight: 800; color: #475569; display: flex; align-items: center; gap: 6px; margin-bottom: 4px;">💤 Engine Idle</div>
                <div style="font-size: 12px; color: #64748b; font-family: monospace; word-break: break-all;" id="currentProcessingMail">Mail: Waiting for data input...</div>
            </div>
            <button id="copyEmailBtn" onclick="copyTextToClipboard('currentProcessingMail', 'Email Copied!')" style="background: #eef2ff; color: #4f46e5; border: none; padding: 10px 16px; border-radius: 10px; font-size: 11px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 4px; transition: background 0.2s;">
                ✉️ Copy Email
            </button>
        </div>

        <div style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 18px; padding: 20px; text-align: left; position: relative;">
            <div style="font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;">Verification Code:</div>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div id="extractedOtpValue" style="font-size: 28px; font-weight: 900; color: #64748b; font-family: 'Courier New', monospace; letter-spacing: 1px;">EMPTY</div>
                <button id="copyCodeBtn" onclick="copyTextToClipboard('extractedOtpValue', 'OTP Code Copied!')" style="background: #2563eb; color: #ffffff; border: none; padding: 12px 20px; border-radius: 12px; font-size: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; box-shadow: 0 4px 10px rgba(37,99,235,0.15); transition: background 0.2s;">
                    🔷 Copy Code
                </button>
            </div>
        </div>

        <div id="mailConsoleScreen" style="display: none;"></div>
        <div style="display: none;"><span id="countProcessed">0</span><span id="countSuccess">0</span></div>

    </div>
</div>

<script>
    // ⚠️ এখানে আপনার রেন্ডার করা ব্যাকএন্ড অ্যাপের ইউআরএলটি বসাবেন
    if (typeof BACKEND_URL === 'undefined') {
        var BACKEND_URL = "https://apnar-render-app-name.onrender.com"; 
    }

    // গ্লোবাল ভেরিয়েবল মোড ট্র্যাক করার জন্য (Default: facebook)
    let currentMailMode = 'facebook';

    // ১. ফেসবুক এবং ইনস্টাগ্রাম ট্যাব সুইচিং ফাংশন
    function setMailMode(mode) {
        currentMailMode = mode;
        const fbTab = document.getElementById('tab-fb');
        const igTab = document.getElementById('tab-ig');
        const modeBadge = document.getElementById('modeBadge');
        const igLabel = document.getElementById('igBadgeLabel');

        if (mode === 'facebook') {
            fbTab.style.background = '#2563eb';
            fbTab.style.color = '#ffffff';
            fbTab.style.boxShadow = '0 4px 12px rgba(37,99,235,0.2)';
            fbTab.style.border = 'none';

            igTab.style.background = '#f1f5f9';
            igTab.style.color = '#64748b';
            igTab.style.border = '1px solid #e2e8f0';
            igTab.style.boxShadow = 'none';
            igLabel.style.background = '#cbd5e1';
            igLabel.style.color = '#64748b';

            modeBadge.innerText = "⭐ FACEBOOK PRIORITY MODE";
            modeBadge.style.background = "#fffbeb";
            modeBadge.style.borderColor = "#fef3c7";
            modeBadge.style.color = "#d97706";
        } else {
            igTab.style.background = '#a855f7'; 
            igTab.style.color = '#ffffff';
            igTab.style.boxShadow = '0 4px 12px rgba(168,85,247,0.2)';
            igTab.style.border = 'none';
            igLabel.style.background = '#f59e0b';
            igLabel.style.color = '#fff';

            fbTab.style.background = '#f1f5f9';
            fbTab.style.color = '#64748b';
            fbTab.style.border = '1px solid #e2e8f0';
            fbTab.style.boxShadow = 'none';

            modeBadge.innerText = "📷 INSTAGRAM PRIORITY MODE";
            modeBadge.style.background = "#fdf2f8";
            modeBadge.style.borderColor = "#fce7f3";
            modeBadge.style.color = "#db2777";
        }
    }

    // ২. ওটিপি এক্সট্রাকশন মেইন প্রসেসর (আপনার ফিক্সড ইমেইল ফিল্টারসহ)
    async function startMailProcessor() {
        const inputData = document.getElementById('mailInputData').value.trim();
        const startBtn = document.getElementById('startMailBtn');
        const alertBox = document.getElementById('mailStatusAlertBox');
        const statusTitle = document.getElementById('mailStatusTitle');
        const mailDisplay = document.getElementById('currentProcessingMail');
        const otpDisplay = document.getElementById('extractedOtpValue');

        if (!inputData) { 
            alert("Please input credential string sets!"); 
            return; 
        }

        // 🔥 ফিক্সড ফিল্টার লজিক: প্রথম পাইপ (|) চিহ্নের আগের একদম ফ্রেশ ইমেইল আলাদা করা
        const firstPipeIndex = inputData.indexOf('|');
        let emailPrefix = "Unknown Mail";
        
        if (firstPipeIndex !== -1) {
            emailPrefix = inputData.substring(0, firstPipeIndex).replace(/[\r\n]/g, "").trim();
        } else {
            emailPrefix = inputData.replace(/[\r\n]/g, "").split(' ')[0].trim();
        }

        // রেন্ডার ব্যাকএন্ডে পাঠানোর জন্য প্রথম লাইনটি নেওয়া
        const firstLine = inputData.split('\n')[0].trim();

        // UI-তে লোডিং স্ট্যাটাস সেট করা
        startBtn.disabled = true;
        startBtn.innerText = "⏳ Processing...";
        alertBox.style.borderLeftColor = "#3b82f6"; 
        statusTitle.innerText = "⚡ Fetching OTP...";
        statusTitle.style.color = "#2563eb";
        
        // এখন স্ক্রিনে নিখুঁতভাবে শুধু মেইল আইডিই শো করবে
        mailDisplay.innerText = "Mail: " + emailPrefix;
        otpDisplay.innerText = "WAITING";
        otpDisplay.style.color = "#64748b";

        try {
            const response = await fetch(`${BACKEND_URL}/get-code`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    raw_input: firstLine, 
                    mode: currentMailMode 
                })
            });
            
            const result = await response.json();

            if (result.status === "success") {
                // সাকসেস হলে সবুজ থিম
                alertBox.style.borderLeftColor = "#22c55e"; 
                statusTitle.innerText = "✅ OTP Extracted Successfully";
                statusTitle.style.color = "#16a34a";
                
                mailDisplay.innerText = "Mail: " + (result.email ? result.email.trim() : emailPrefix);
                otpDisplay.innerText = result.code; 
                otpDisplay.style.color = "#ea580c"; 
            } else {
                // এরর হলে লাল থিম এবং RETRY
                alertBox.style.borderLeftColor = "#ef4444"; 
                statusTitle.innerText = "❌ " + result.message;
                statusTitle.style.color = "#dc2626";
                otpDisplay.innerText = "RETRY";
                otpDisplay.style.color = "#ef4444";
            }
        } catch (err) {
            // কানেকশন এরর বা সার্ভার অফলাইন থাকলে
            alertBox.style.borderLeftColor = "#ef4444";
            statusTitle.innerText = "❌ Connection Failed";
            statusTitle.style.color = "#dc2626";
            mailDisplay.innerText = "Backend Server is offline or unreachable.";
            otpDisplay.innerText = "RETRY";
            otpDisplay.style.color = "#ef4444";
        }

        startBtn.disabled = false;
        startBtn.innerText = "🔍 Extract OTP Code";
    }

    // ৩. ক্লিপবোর্ডে কপি করার ইউনিভার্সাল মেথড
    function copyTextToClipboard(elementId, successMessage) {
        let textToCopy = document.getElementById(elementId).innerText.replace("Mail: ", "").trim();
        
        if (textToCopy === "EMPTY" || textToCopy === "WAITING" || textToCopy.includes("Waiting for data")) {
            alert("No valid data available to copy!");
            return;
        }

        navigator.clipboard.writeText(textToCopy).then(() => {
            alert(successMessage);
        }).catch(err => {
            // ব্রাউজার সিকিউরিটি প্রটেকশন ব্যাকআপ মেথড
            const el = document.createElement('textarea');
            el.value = textToCopy;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert(successMessage);
        });
    }

    // ৪. অল টেক্সট ক্লিয়ার করার স্ক্রিপ্ট
    function clearMailTool() { 
        document.getElementById('mailInputData').value = ''; 
        document.getElementById('extractedOtpValue').innerText = 'EMPTY';
        document.getElementById('extractedOtpValue').style.color = '#64748b';
        
        const alertBox = document.getElementById('mailStatusAlertBox');
        const statusTitle = document.getElementById('mailStatusTitle');
        
        alertBox.style.borderLeftColor = "#cbd5e1";
        statusTitle.innerText = "💤 Engine Idle";
        statusTitle.style.color = "#475569";
        document.getElementById('currentProcessingMail').innerText = 'Mail: Waiting for data input...';
    }
</script>
