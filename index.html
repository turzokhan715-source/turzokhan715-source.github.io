<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Bulk UID Checker Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #090b0e;
            color: #333;
            min-height: 100vh;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
        }

        /* Top Header Navigation - Mobile Friendly */
        .top-navbar {
            width: 100%;
            max-width: 1100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            gap: 8px;
        }

        .nav-left .nav-btn-home {
            background: #6366f1;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 12px rgba(99, 102, 241, 0.4);
            font-size: 12px;
        }

        .nav-right {
            display: flex;
            gap: 6px;
        }

        .nav-right .nav-btn {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 12px rgba(79, 70, 229, 0.4);
            font-size: 11px;
        }

        /* Main Panel Card */
        .main-panel {
            width: 100%;
            max-width: 1100px;
            background: #ffffff;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .panel-title {
            font-size: 20px;
            font-weight: 700;
            color: #8b5cf6;
            margin-bottom: 15px;
            text-align: center;
        }

        /* Input Box - [FIXED MOBILE SCROLL] */
        .input-area-wrapper {
            margin-bottom: 12px;
            position: relative;
        }

        textarea {
            width: 100%;
            height: 130px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 10px;
            font-size: 13px;
            color: #475569;
            outline: none;
            resize: none;
            font-weight: 500;
            overflow-y: auto;
            position: relative;
            z-index: 10;
            -webkit-overflow-scrolling: touch; /* আইফোনে স্ক্রল ফিক্স */
        }

        /* Action Buttons */
        .action-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .btn-start {
            flex: 1;
            background: linear-gradient(90deg, #6366f1, #3b82f6);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 0.5px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn-clear {
            background: #ef4444;
            color: white;
            border: none;
            padding: 0 18px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Black Console Box - [FIXED MOBILE SCROLL] */
        .console-box {
            width: 100%;
            height: 220px;
            background: #090d16;
            border-radius: 12px;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #10b981;
            overflow-y: auto;
            margin-bottom: 15px;
            box-shadow: inset 0 3px 8px rgba(0,0,0,0.8);
            line-height: 1.5;
            position: relative;
            z-index: 10;
            -webkit-overflow-scrolling: touch; /* টাচ স্ক্রল অ্যাক্টিভেট */
        }

        .console-log { margin-bottom: 3px; word-break: break-all; }
        .log-live { color: #10b981; }
        .log-die { color: #ef4444; }

        /* Footer Stats & Download Button */
        .footer-row {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        @media (min-width: 600px) {
            .footer-row {
                flex-direction: row;
                justify-content: space-between;
            }
            .panel-title { text-align: left; }
        }

        .stats-group {
            display: flex;
            gap: 8px;
            width: 100%;
            justify-content: space-between;
        }

        @media (min-width: 600px) {
            .stats-group { width: auto; }
        }

        .stat-card {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 8px;
            text-align: center;
            flex: 1;
            min-width: 75px;
        }

        .stat-num {
            font-size: 13px;
            font-weight: 700;
            display: block;
            margin-bottom: 2px;
        }

        .stat-label {
            font-size: 9px;
            color: #64748b;
            font-weight: bold;
            text-transform: uppercase;
        }

        .total-color { color: #334155; }
        .live-color { color: #10b981; }
        .die-color { color: #ef4444; }

        .btn-download {
            width: 100%;
            background: #10b981;
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
            transition: 0.2s;
            text-align: center;
            -webkit-appearance: none; /* মোবাইল ব্রাউজার ওভাররাইડ রিমুভ */
        }

        @media (min-width: 600px) {
            .btn-download { width: auto; }
        }

        .btn-download:hover { background: #059669; }
    </style>
</head>
<body>

    <div class="top-navbar">
        <div class="nav-left">
            <button class="nav-btn-home">🏠 HOME</button>
        </div>
        <div class="nav-right">
            <button class="nav-btn">2FA</button>
            <button class="nav-btn">MAIL</button>
            <button class="nav-btn">CHECKER</button>
        </div>
    </div>

    <div class="main-panel">
        <div class="panel-title">Bulk UID Checker</div>
        
        <div class="input-area-wrapper">
            <textarea id="inputData" placeholder="Paste data here... (Supports UID|PASS|2FA or Space/Tab formats)"></textarea>
        </div>

        <div class="action-row">
            <button class="btn-start" id="startBtn" onclick="startScanner()">Start Scanner</button>
            <button class="btn-clear" onclick="clearTool()">Clear</button>
        </div>

        <div class="console-box" id="consoleScreen">Console ready...</div>

        <div class="footer-row">
            <div class="stats-group">
                <div class="stat-card">
                    <span class="stat-num total-color" id="totalCount">0</span>
                    <span class="stat-label">Total</span>
                </div>
                <div class="stat-card">
                    <span class="stat-num live-color" id="livePercent">0% LIVE</span>
                    <span class="stat-label">Live</span>
                </div>
                <div class="stat-card">
                    <span class="stat-num die-color" id="diePercent">0% DIE</span>
                    <span class="stat-label">Die</span>
                </div>
            </div>
            
            <button class="btn-download" onclick="downloadLiveCSV()">DOWNLOAD GOOGLE SHEET FILE</button>
        </div>
    </div>

<script>
    let liveAccounts = []; 
    const CONCURRENCY_LIMIT = 5; 

    async function checkFacebookUID(uid) {
        try {
            const cleanUID = uid.trim().replace(/[^a-zA-Z0-9.]/g, "");
            if(!cleanUID) return "DEAD ❌";
            
            const response = await fetch(`https://graph.facebook.com/${cleanUID}/picture?type=normal&_ts=${Date.now()}`);
            if (response.ok && response.url.includes('100x100')) {
                return "LIVE ✅";
            } else {
                return "DEAD ❌";
            }
        } catch (error) {
            return "ERROR ⚠️";
        }
    }

    async function startScanner() {
        const inputStr = document.getElementById('inputData').value.trim();
        const consoleScreen = document.getElementById('consoleScreen');
        const startBtn = document.getElementById('startBtn');
        
        if (!inputStr) {
            alert("Please paste your UID data first!");
            return;
        }

        const lines = inputStr.split('\n').map(line => line.trim()).filter(line => line.length > 0);
        
        consoleScreen.innerHTML = "Initializing multi-threaded engine...<br>";
        liveAccounts = [];
        let total = lines.length;
        let live = 0;
        let die = 0;

        document.getElementById('totalCount').innerText = total;
        startBtn.disabled = true;
        startBtn.innerText = "Scanning Fast...";

        function updateStats() {
            const livePct = total > 0 ? Math.round((live / total) * 100) : 0;
            const diePct = total > 0 ? Math.round((die / total) * 100) : 0;
            document.getElementById('livePercent').innerText = `${livePct}% LIVE`;
            document.getElementById('diePercent').innerText = `${diePct}% DIE`;
        }

        const queue = [...lines];
        
        async function worker() {
            while (queue.length > 0) {
                const currentLine = queue.shift();
                if (!currentLine) continue;

                let parts = [];
                if (currentLine.includes('|')) {
                    parts = currentLine.split('|');
                } else {
                    parts = currentLine.split(/\s+/); 
                }

                const uid = parts[0] ? parts[0].trim() : '';
                const pass = parts[1] ? parts[1].trim() : '';
                const twoFA = parts[2] ? parts[2].trim() : '';

                if (!uid) continue;

                const result = await checkFacebookUID(uid);
                const logLine = document.createElement('div');
                logLine.className = 'console-log';

                if (result === "LIVE ✅") {
                    logLine.className += ' log-live';
                    logLine.innerText = `[LIVE] ID: ${uid}`;
                    live++;
                    liveAccounts.push({ uid, pass, twoFA });
                } else {
                    logLine.className += ' log-die';
                    logLine.innerText = `[DIE] ID: ${uid}`;
                    die++;
                }

                consoleScreen.appendChild(logLine);
                consoleScreen.scrollTop = consoleScreen.scrollHeight; 
                updateStats();
            }
        }

        const workers = [];
        const activeThreads = Math.min(CONCURRENCY_LIMIT, queue.length);
        
        for (let i = 0; i < activeThreads; i++) {
            workers.push(worker());
        }

        await Promise.all(workers);

        const finalLog = document.createElement('div');
        finalLog.style.color = '#58a6ff';
        finalLog.style.paddingTop = '10px';
        finalLog.innerText = `⚡ Completed! Live: ${live}, Die: ${die}`;
        consoleScreen.appendChild(finalLog);
        consoleScreen.scrollTop = consoleScreen.scrollHeight;
        
        startBtn.disabled = false;
        startBtn.innerText = "Start Scanner";
    }

    // [FIXED PHONE DOWNLOAD] মোবাইল ব্রাউজার ফ্রেন্ডলি ইউনিভার্সাল ডাউনলোডার
    function downloadLiveCSV() {
        if (liveAccounts.length === 0) {
            alert("No live accounts found to download!");
            return;
        }

        let csvRows = ["UID,PASSWORD,2FA"];

        liveAccounts.forEach(account => {
            csvRows.push(`"${account.uid}","${account.pass}","${account.twoFA}"`);
        });

        const csvString = csvRows.join("\n");
        
        // UTF-8 BOM যুক্ত প্রোপার ডাটা ফরম্যাট
        const contentWithBOM = "\ufeff" + csvString;
        
        // মোবাইল ডাউনলোডের ইউনিভার্সাল মেথড (Data URI)
        const link = document.createElement("a");
        link.setAttribute("href", "data:text/csv;charset=utf-8," + encodeURIComponent(contentWithBOM));
        link.setAttribute("download", "live_accounts.csv");
        
        // কিছু মোবাইল ব্রাউজারে ট্রিগার করার জন্য বডিতে অ্যাপেন্ড করে ক্লিক করা হলো
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function clearTool() {
        document.getElementById('inputData').value = '';
        document.getElementById('consoleScreen').innerHTML = 'Console ready...';
        document.getElementById('totalCount').innerText = '0';
        document.getElementById('livePercent').innerText = '0% LIVE';
        document.getElementById('diePercent').innerText = '0% DIE';
        liveAccounts = [];
    }
</script>

</body>
</html>
