<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Code Retriever</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col justify-center items-center p-4">

    <div class="w-full max-w-xl border border-gray-800 rounded-xl shadow-2xl p-6 bg-slate-800">
        <div class="flex items-center space-x-3 border-b border-gray-700 pb-4 mb-4">
            <i class="fab fa-facebook text-blue-500 text-3xl"></i>
            <h1 class="text-xl font-bold tracking-tight text-white">FB Multi-Account Retriever</h1>
        </div>

        <div class="mb-4 flex space-x-2">
            <button onclick="loadAccount(1)" class="flex-1 bg-slate-700 hover:bg-slate-600 text-xs font-bold py-2 px-3 rounded border border-gray-600 transition cursor-pointer">
                <i class="fas fa-user mr-1 text-blue-400"></i> Account 1
            </button>
            <button onclick="loadAccount(2)" class="flex-1 bg-slate-700 hover:bg-slate-600 text-xs font-bold py-2 px-3 rounded border border-gray-600 transition cursor-pointer">
                <i class="fas fa-user mr-1 text-green-400"></i> Account 2
            </button>
        </div>

        <div class="mb-4">
            <label class="block text-sm font-semibold text-gray-300 mb-2">Account Data Line</label>
            <textarea 
                id="rawData" 
                class="w-full h-24 bg-gray-900 border border-gray-700 rounded-lg p-3 text-sm font-mono text-blue-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
                placeholder="email|password|refresh_token|client_id"
            ></textarea>
        </div>

        <div class="bg-gray-900 border border-gray-700 p-3 rounded-lg flex justify-between items-center mb-4">
            <div>
                <span class="text-xs text-gray-400 block">Target Email:</span>
                <span id="targetEmail" class="text-sm font-semibold text-gray-200">Waiting for data...</span>
            </div>
        </div>

        <button onclick="getCode()" id="actionBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-md flex justify-center items-center cursor-pointer">
            <span id="btnText"><i class="fas fa-key mr-2"></i> Get Facebook Code</span>
        </button>

        <div id="resultBox" class="mt-5 border border-gray-700 rounded-lg p-4 bg-gray-900 hidden">
            <div class="flex justify-between items-center border-b border-gray-800 pb-2 mb-3">
                <span class="text-xs font-semibold text-gray-400">STATUS:</span>
                <span id="statusLabel" class="text-xs font-bold px-2 py-0.5 rounded"></span>
            </div>
            <div class="flex justify-between items-center bg-slate-800 p-3 rounded-lg border border-gray-700">
                <div>
                    <span class="text-xs text-gray-400 block">OTP Code:</span>
                    <span id="otpOutput" class="text-3xl font-mono font-bold tracking-wider text-green-400">XXXXXX</span>
                </div>
                <button onclick="copyCode()" class="bg-gray-700 hover:bg-gray-600 text-white px-3 py-1.5 rounded text-xs font-semibold transition cursor-pointer">
                    <i class="fas fa-copy mr-1"></i> Copy
                </button>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ আপনার ২টা অ্যাকাউন্টের সম্পূর্ণ ডাটা লাইন (email|pass|token|id) নিচে কোটেশনের ভেতর বসিয়ে রাখতে পারেন
        const account1_data = "email1@outlook.com|pass1|refresh_token_1|client_id_1";
        const account2_data = "email2@outlook.com|pass2|refresh_token_2|client_id_2";

        // ডাটা লাইন ইনপুট দেওয়ার সাথে সাথে ইমেইলটি আলাদা করার লজিক
        document.getElementById('rawData').addEventListener('input', function(e) {
            const val = e.target.value.trim();
            if(val.includes('|')) {
                document.getElementById('targetEmail').innerText = val.split('|')[0];
            } else {
                document.getElementById('targetEmail').innerText = "Waiting for data...";
            }
        });

        function loadAccount(num) {
            if(num === 1) {
                document.getElementById('rawData').value = account1_data;
                document.getElementById('targetEmail').innerText = account1_data.split('|')[0];
            }
            if(num === 2) {
                document.getElementById('rawData').value = account2_data;
                document.getElementById('targetEmail').innerText = account2_data.split('|')[0];
            }
        }

        async function getCode() {
            const rawInput = document.getElementById('rawData').value.trim();
            const actionBtn = document.getElementById('actionBtn');
            const btnText = document.getElementById('btnText');
            const resultBox = document.getElementById('resultBox');
            const statusLabel = document.getElementById('statusLabel');
            const otpOutput = document.getElementById('otpOutput');

            if(!rawInput) {
                alert('Please enter or select your data line!');
                return;
            }

            actionBtn.disabled = true;
            btnText.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Fetching from Render Cloud...';
            resultBox.classList.remove('hidden');
            statusLabel.className = "text-xs font-bold px-2 py-0.5 rounded bg-yellow-500/20 text-yellow-400";
            statusLabel.innerText = "PROCESSING";
            otpOutput.innerText = "XXXXXX";

            try {
                // ⚠️ আপনার Render-এ ডেপ্লয় করার পর যে লাইভ URL পাবেন, সেটা নিচের লিংকের জায়গায় বসাবেন
                const API_URL = "https://fb-code-api.onrender.com/get-code"; 

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ raw_input: rawInput })
                });
                const data = await response.json();

                actionBtn.disabled = false;
                btnText.innerHTML = '<i class="fas fa-key mr-2"></i> Get Facebook Code';

                if(data.status === 'success') {
                    statusLabel.className = "text-xs font-bold px-2 py-0.5 rounded bg-green-500/20 text-green-400";
                    statusLabel.innerText = "SUCCESS";
                    otpOutput.innerText = data.code;
                    otpOutput.className = "text-3xl font-mono font-bold tracking-wider text-green-400";
                } else {
                    statusLabel.className = "text-xs font-bold px-2 py-0.5 rounded bg-red-500/20 text-red-400";
                    statusLabel.innerText = "FAILED";
                    otpOutput.innerText = data.message;
                    otpOutput.className = "text-sm font-sans font-medium text-red-400";
                }
            } catch (err) {
                actionBtn.disabled = false;
                btnText.innerHTML = '<i class="fas fa-key mr-2"></i> Get Facebook Code';
                statusLabel.className = "text-xs font-bold px-2 py-0.5 rounded bg-red-500/20 text-red-400";
                statusLabel.innerText = "ERROR";
                otpOutput.innerText = "Render Server is waking up. Please try again after 30 seconds.";
                otpOutput.className = "text-sm font-sans font-medium text-red-400";
            }
        }

        function copyCode() {
            const text = document.getElementById('otpOutput').innerText;
            if(text && text !== 'XXXXXX' && !text.includes('waking up')) {
                navigator.clipboard.writeText(text);
                alert('Code Copied!');
            }
        }
    </script>
</body>
</html>
