<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Longisir VIP Portal</title>
    <style>
        :root {
            --primary: #a855f7;
            --bg: #0f111a;
            --card-bg: #151824;
            --text-gray: #9ca3af;
            --btn-grad: linear-gradient(135deg, #a855f7, #6366f1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; min-height: 100vh; }
        .page { display: none; }
        .page.active { display: block; }

        /* Navigation */
        .top-nav { background: rgba(15, 17, 26, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding: 15px 0; position: sticky; top: 0; z-index: 1000; }
        .nav-container { max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
        .nav-links a { color: var(--text-gray); text-decoration: none; font-weight: 600; font-size: 14px; margin-left: 20px; cursor: pointer; }
        .nav-links a.active { color: #fff; }

        .container { max-width: 1100px; margin: 0 auto; padding: 60px 20px; }
        
        /* Home & Tools Grid */
        .home-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .h-card { background: var(--card-bg); padding: 40px; border-radius: 20px; text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }
        .h-card i { font-size: 40px; color: var(--primary); margin-bottom: 15px; display: block; }
        
        /* Sales Page */
        .content-box { background: var(--card-bg); padding: 40px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* Responsive */
        @media (max-width: 768px) { .nav-container { flex-direction: column; gap: 15px; } }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="nav-container">
            <div class="logo" onclick="showPage('home')">LONGISIR VIP</div>
            <div class="nav-links">
                <a onclick="showPage('home')" class="nav-link active" data-page="home">Home</a>
                <a onclick="showPage('about')" class="nav-link" data-page="about">About</a>
                <a onclick="showPage('sales')" class="nav-link" data-page="sales">Sales</a>
            </div>
        </div>
    </nav>

    <div id="home" class="page active">
        <div class="container">
            <div class="home-grid">
                <div class="h-card" onclick="location.href='2fa-tool.html'">
                    <i class="fa-solid fa-shield"></i>
                    <h3>2FA Tool</h3>
                </div>
                <div class="h-card" onclick="location.href='uid-checker.html'">
                    <i class="fa-solid fa-bolt"></i>
                    <h3>UID Checker</h3>
                </div>
            </div>
        </div>
    </div>

    <div id="about" class="page">
        <div class="container">
            <div class="content-box">
                <h2>About Longisir VIP</h2>
                <p>Professional automation hub.</p>
            </div>
        </div>
    </div>

    <div id="sales" class="page">
        <div class="container">
            <div class="content-box">
                <h2>100% Free Access</h2>
                <p>Enjoy all our tools for free forever.</p>
            </div>
        </div>
    </div>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }
    </script>
</body>
</html>
