<div id="page-mail" class="page" style="width: 100%; display: flex; justify-content: center; align-items: center; padding: 20px 0; background: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
    <div class="luxury-card" style="background: #ffffff; width: 100%; max-width: 520px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); padding: 35px; border: 1px solid rgba(0,0,0,0.02); color: #333;">
        
        <div style="text-align: center; margin-bottom: 25px;">
            <div style="font-size: 38px; margin-bottom: 8px;">🔮</div>
            <h2 style="font-size: 26px; font-weight: 800; color: #0f172a; letter-spacing: -0.5px; margin-bottom: 4px;">FB & IG OTP Extractor</h2>
            <p style="font-size: 13px; color: #64748b; font-weight: 500;">Facebook & Instagram Verification Code Extractor</p>
        </div>

        <div style="display: flex; justify-content: center; margin-bottom: 25px;">
            <div style="background: #fffbeb; border: 1px solid #fef3c7; color: #d97706; padding: 8px 24px; border-radius: 50px; font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 6px; box-shadow: 0 2px 6px rgba(217,119,6,0.05);">
                ⭐ FACEBOOK PRIORITY MODE
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px;">
            <button style="background: #2563eb; color: #ffffff; border: none; padding: 14px; border-radius: 14px; font-weight: 700; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 12px rgba(37,99,235,0.2);">
                Facebook <span style="background: #f59e0b; color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 6px; font-weight: 800;">1st</span>
            </button>
            <button style="background: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; padding: 14px; border-radius: 14px; font-weight: 600; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;">
                📷 Instagram <span style="background: #cbd5e1; color: #64748b; font-size: 10px; padding: 2px 6px; border-radius: 6px; font-weight: 700;">2nd</span>
            </button>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px;">
            <div style="background: #f8fafc; border: 1px solid #e2e8f0; padding: 10px; border-radius: 14px; text-align: center; font-size: 13px; font-weight: 600; color: #2563eb; display: flex; align-items: center; justify-content: center; gap: 6px;">
                👤 Account 1
            </div>
            <div style="background: #f8fafc; border: 1px solid #e2e8f0; padding: 10px; border-radius: 14px; text-align: center; font-size: 13px; font-weight: 600; color: #a855f7; display: flex; align-items: center; justify-content: center; gap: 6px;">
                🔮 Account 2
            </div>
        </div>

        <div style="border-left: 3px solid #0f172a; border-right: 3px solid #0f172a; padding: 0 4px; margin-bottom: 25px; border-radius: 4px;">
            <div style="font-size: 11px; font-weight: 800; color: #334155; margin-bottom: 8px; padding-left: 6px; letter-spacing: 0.5px; text-transform: uppercase;">📋 Paste your email data here:</div>
            <textarea id="mailInputData" placeholder="Format: email|password|token|uuid" style="width: 100%; height: 120px; padding: 14px; border: 1px solid #e2e8f0; border-radius: 14px; font-size: 13px; color: #334155; background: #ffffff; font-family: 'Courier New', monospace; resize: none; box-shadow: inset 0 2px 4px rgba(0,0,0,0.01); outline: none; line-height: 1.5;"></textarea>
        </div>

        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 12px; margin-bottom: 25px;">
            <button id="startMailBtn" onclick="startMailProcessor()" style="background: #f1f5f9; color: #1e293b; border: 1px solid #cbd5e1; padding: 15px; border-radius: 14px; font-size: 13px; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; justify-content: center; gap: 8px;">
                🔍 Extract OTP Code
            </button>
            <button onclick="clearMailTool()" style="background: #f1f5f9; color: #64748b; border: 1px solid #cbd5e1; padding: 15px; border-radius: 14px; font-size: 13px; font-weight: 800; cursor: pointer; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 6px;">
                🗑️ Clear
            </button>
        </div>

        <div id="mailConsoleScreen" style="background: #f8fafc; border: 1px solid #f1f5f9; border-left: 4px solid #ef4444; border-radius: 16px; padding: 16px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
            <div style="flex: 1; padding-right: 10px;">
                <div style="font-size: 13px; font-weight: 800; color: #15803d; display: flex; align-items: center; gap: 6px; margin-bottom: 4px;">⚠️ Server Sleeping / Error</div>
                <div style="font-size: 11px; color: #64748b; font-family: monospace; word-break: break-all;" id="currentProcessingMail">Mail: waiting_input@outlook.com</div>
            </div>
            <button style="background: #eef2ff; color: #4f46e5; border: none; padding: 10px 16px; border-radius: 10px; font-size: 11px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 4px;">✉️ Copy Email</button>
        </div>

        <div style="background: #f8fafc; border: 1px solid #f1f5f9; border-radius: 18px; padding: 20px; text-align: left; position: relative;">
            <div style="font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;">Verification Code:</div>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div id="extractedOtpValue" style="font-size: 28px; font-weight: 900; color: #ea580c; font-family: 'Courier New', monospace; letter-spacing: 1px;">RETRY</div>
                <button style="background: #2563eb; color: #ffffff; border: none; padding: 12px 20px; border-radius: 12px; font-size: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; box-shadow: 0 4px 10px rgba(37,99,235,0.15);">
                    🔷 Copy Code
                </button>
            </div>
        </div>

        <div style="display: none;">
            <span id="countProcessed">0</span>
            <span id="countSuccess">0</span>
        </div>

    </div>
</div>
