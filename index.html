<div id="page-mail" class="page">
    <div class="tool-panel">
        <textarea id="mailInputData" placeholder="Paste your Email accounts or tokens here..."></textarea>
        
        <div class="action-row">
            <button class="btn-start-engine" id="startMailBtn" onclick="startMailProcessor()">Start Mail Engine</button>
            <button class="btn-clear-engine" onclick="clearMailTool()">Clear</button>
        </div>

        <div class="console-box" id="mailConsoleScreen" style="background: #03050a; color: #38bdf8; width: 100%; height: 280px; border-radius: 14px; padding: 18px; font-family: 'Courier New', monospace; font-size: 14px; overflow-y: auto; margin-bottom: 25px; border: 1px solid #1e293b;">
            Console ready for Mail Server Engine...
        </div>

        <div class="mail-status-container" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-top: 15px;">
            <div class="mail-stats-flex" style="display: flex; gap: 12px;">
                <div class="mail-badge" style="background: #0b0d16; border: 1px solid #1e293b; border-radius: 12px; padding: 12px 25px; min-width: 110px; text-align: center;">
                    <span class="mail-num" id="countProcessed" style="color: #fff; font-size: 22px; font-weight: 800; display: block;">0</span>
                    <span class="mail-lbl" style="font-size: 10px; color: #94a3b8; font-weight: 700; text-transform: uppercase; margin-top: 2px; letter-spacing: 0.5px;">Processed</span>
                </div>
                <div class="mail-badge" style="background: #0b0d16; border: 1px solid #1e293b; border-radius: 12px; padding: 12px 25px; min-width: 110px; text-align: center;">
                    <span class="mail-num" id="countSuccess" style="color: #3b82f6; font-size: 22px; font-weight: 800; display: block;">0</span>
                    <span class="mail-lbl" style="font-size: 10px; color: #3b82f6; font-weight: 700; text-transform: uppercase; margin-top: 2px; letter-spacing: 0.5px;">Success</span>
                </div>
            </div>
            <button class="btn-download-mail" onclick="downloadMailCSV()" style="background: #2563eb; color: white; border: none; padding: 16px 32px; border-radius: 12px; font-size: 14px; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: background 0.2s;">
                Download Extracted Data
            </button>
        </div>
    </div>
</div>
