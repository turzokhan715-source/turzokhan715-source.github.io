<body>
    <div class="container">
        <div class="header">
            <h1>📧 Outlook → FB/IG OTP [DEBUG]</h1>
            <p>Extract Facebook/Instagram codes from Outlook/Hotmail data</p>
        </div>
        
        <div class="tab-container">
            <div class="tab-button active fb" id="fbTab" onclick="selectPlatform('facebook')">
                📘 Facebook
            </div>
            <div class="tab-button inactive" id="igTab" onclick="selectPlatform('instagram')">
                📷 Instagram
            </div>
        </div>
        
        <div class="input-section">
            <label>📋 Paste Outlook/Hotmail Data:</label>
            <textarea id="emailInput" placeholder="Paste your Outlook/Hotmail data here..."></textarea>
        </div>
        
        <div class="btn-group">
            <button class="btn-extract" onclick="extractOTP()">🔍 Extract OTP Code</button>
            <button class="btn-clear" onclick="clearAll()">🗑️ Clear All</button>
        </div>
        
        <!-- DEBUG PANEL -->
        <div class="debug-panel" id="debugPanel">
            <h4>🐛 Debug Info - All Detected Numbers:</h4>
            <div class="debug-codes" id="debugCodes">-</div>
        </div>
        
        <div class="result-section">
            <div class="data-display" id="dataDisplay" style="display:none;">
                <div class="data-row">
                    <span class="data-label">📧 Email:</span>
                    <span id="emailOut">-</span>
                </div>
                <div class="data-row">
                    <span class="data-label">🔑 Password:</span>
                    <span id="passOut">-</span>
                </div>
            </div>
            
            <div class="platform-detected waiting" id="platformDisplay">
                ⏳ Select platform and paste data...
            </div>
            
            <div class="code-container">
                <div class="code-display waiting" id="codeDisplay">------</div>
            </div>
            
            <div class="copy-indicator" id="copyMsg"></div>
        </div>
    </div>

    <script>
        var selectedPlatform = 'facebook';
        
        function selectPlatform(platform) {
            selectedPlatform = platform;
            
            var fbTab = document.getElementById('fbTab');
            var igTab = document.getElementById('igTab');
            
            if(platform === 'facebook') {
                fbTab.className = 'tab-button active fb';
                igTab.className = 'tab-button inactive';
            } else {
                fbTab.className = 'tab-button inactive';
                igTab.className = 'tab-button active ig';
            }
        }
        
        function clearAll() {
            document.getElementById('emailInput').value = '';
            document.getElementById('dataDisplay').style.display = 'none';
            document.getElementById('debugPanel').style.display = 'none';
            document.getElementById('emailOut').innerText = '-';
            document.getElementById('passOut').innerText = '-';
            document.getElementById('codeDisplay').className = 'code-display waiting';
            document.getElementById('codeDisplay').innerText = '------';
            document.getElementById('copyMsg').innerText = '';
            document.getElementById('debugCodes').innerText = '-';
            
            var platformDisplay = document.getElementById('platformDisplay');
            platformDisplay.className = 'platform-detected waiting';
            platformDisplay.innerText = '⏳ Select platform and paste data...';
        }
        
        function extractOTP() {
            var input = document.getElementById('emailInput').value.trim();
            
            if(!input) {
                alert('⚠️ Please paste data first!');
                return;
            }
            
            // COMPLETE RESET
            document.getElementById('codeDisplay').className = 'code-display waiting';
            document.getElementById('codeDisplay').innerText = 'SEARCHING...';
            document.getElementById('copyMsg').innerText = '';
            document.getElementById('debugCodes').innerText = 'Analyzing...';
            document.getElementById('debugPanel').style.display = 'block';
            
            // Parse email and password
            var parts = input.split('|');
            var email = '';
            var password = '';
            
            if(parts.length >= 1 && parts[0].includes('@')) {
                email = parts[0].trim();
                document.getElementById('emailOut').innerText = email;
            }
            
            if(parts.length >= 2) {
                password = parts[1].trim();
                document.getElementById('passOut').innerText = password;
            }
            
            if(email || password) {
                document.getElementById('dataDisplay').style.display = 'block';
            }
            
            // Platform display
            var platformDisplay = document.getElementById('platformDisplay');
            if(selectedPlatform === 'facebook') {
                platformDisplay.className = 'platform-detected fb';
                platformDisplay.innerText = '✅ Extracting Facebook Code';
            } else {
                platformDisplay.className = 'platform-detected ig';
                platformDisplay.innerText = '✅ Extracting Instagram Code';
            }
            
            // EXTRACT ALL NUMBERS FOR DEBUG
            var allNumbers = input.match(/\d+/g);
            var debugInfo = [];
            
            if(allNumbers && allNumbers.length > 0) {
                for(var i = 0; i < allNumbers.length; i++) {
                    var num = allNumbers[i];
                    debugInfo.push(num + ' (' + num.length + ' digits)');
                }
                document.getElementById('debugCodes').innerText = debugInfo.join(', ');
            } else {
                document.getElementById('debugCodes').innerText = 'No numbers found!';
            }
            
            // EXTRACT OTP - Find 4-8 digit codes
            var otp = null;
            
            if(allNumbers && allNumbers.length > 0) {
                var validCodes = [];
                
                for(var j = 0; j < allNumbers.length; j++) {
                    var num = allNumbers[j];
                    var len = num.length;
                    
                    if(len >= 4 && len <= 8) {
                        validCodes.push(num);
                    }
                }
                
                // Take LAST valid code
                if(validCodes.length > 0) {
                    otp = validCodes[validCodes.length - 1];
                }
            }
            
            // Display result
            var codeDisplay = document.getElementById('codeDisplay');
            var copyMsg = document.getElementById('copyMsg');
            
            if(otp) {
                codeDisplay.className = 'code-display';
                codeDisplay.innerText = otp;
                
                navigator.clipboard.writeText(otp).then(function() {
                    copyMsg.className = 'copy-indicator success';
                    copyMsg.innerText = '✓ Code copied: ' + otp;
                    
                    setTimeout(function() {
                        copyMsg.innerText = '';
                    }, 3000);
                }).catch(function() {
                    copyMsg.innerText = '💡 Click code to copy';
                });
                
            } else {
                codeDisplay.className = 'code-display error';
                codeDisplay.innerText = 'NO CODE FOUND';
                copyMsg.innerText = '❌ No 4-8 digit code detected';
            }
        }
        
        // Auto-extract on paste
        document.getElementById('emailInput').addEventListener('paste', function() {
            // Clear immediately
            document.getElementById('codeDisplay').className = 'code-display waiting';
            document.getElementById('codeDisplay').innerText = 'WAITING...';
            
            setTimeout(extractOTP, 500);
        });
        
        // Click to copy
        document.getElementById('codeDisplay').addEventListener('click', function() {
            var code = this.innerText;
            if(code !== '------' && code !== 'SEARCHING...' && code !== 'WAITING...' && code !== 'NO CODE FOUND') {
                navigator.clipboard.writeText(code);
                document.getElementById('copyMsg').className = 'copy-indicator success';
                document.getElementById('copyMsg').innerText = '✓ Copied: ' + code;
            }
        });
    </script>
