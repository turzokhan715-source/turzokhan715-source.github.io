<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Longisir VIP Graph Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: #05060f; min-height: 100vh; color: #fff; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 900px; }
        .hidden { display: none; }
        .card-main { background: #ffffff; color: #1e293b; border-radius: 24px; padding: 30px; min-height: 600px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; }
        .top-nav { display: flex; justify-content: center; gap: 10px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 50px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .tab-btn { padding: 12px 24px; border-radius: 50px; border: none; background: transparent; color: #fff; font-weight: 800; cursor: pointer; }
        .tab-btn.active { background: #fff; color: #4f46e5; box-shadow: 0 0 20px #fff; }
        .back-home { background: #4f46e5; border: none; color: #fff; padding: 10px 20px; border-radius: 12px; cursor: pointer; margin-bottom: 15px; font-weight: 700; }
        .label-text { display: block; font-size: 12px; font-weight: 800; color: #64748b; margin: 15px 0 8px; text-transform: uppercase; }
        .input-field { width: 100%; padding: 16px; border-radius: 16px; border: 2px solid #e2e8f0; font-size: 15px; outline: none; background: #f8fafc; }
        .btn-action { width: 100%; padding: 18px; border-radius: 16px; border: none; background: #1e293b; color: #fff; font-weight: 800; margin: 20px 0; cursor: pointer; font-size: 16px; }
        .btn-action:hover { background: #4f46e5; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(79,70,229,0.3); }
        .result-console { background: #0f172a; color: #38bdf8; border-radius: 16px; padding: 20px; height: 350px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 14px; border: 1px solid #1e293b; }
        .status-live { color: #22c55e; font-weight: bold; }
        .status-die { color: #ef4444; font-weight: bold; }
        .home-wrap { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-top: 50px; }
        .tool-card { background: rgba(255,255,255,0.03); padding: 40px; text-align: center; width: 270px; border-radius: 32px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .tool-card:hover { border-color: #4f46e5; box-shadow: 0 0 20px rgba(79,70,229,0.2); }
    </style>
</head>
<body>

<div class="container">
    <div id="home-screen">
        <div style="text-align:center; padding-top:40px; margin-bottom: 40px;">
            <h1 style="font-size:48px;">Longisir Portal</h1>
            <p style="opacity:0.5;">GRAPH API ENABLED TOOLS</p>
        </div>
        <div class="home-wrap">
            <div class="tool-card" onclick="switchUI('2fa')"><span>🔐</span><br><br><h3 style="color:#fff;">2FA Auth</h3></div>
            <div class="tool-card" onclick="switchUI('mail')"><span>📧</span><br><br><h3 style="color:#fff;">Mail API</h3></div>
            <div class="tool-card" onclick="switchUI('live')"><span>✅</span><br><br><h3 style="color:#fff;">Live Checker</h3></div>
        </div>
    </div>

    <div id="tool-screen" class="hidden">
        <button class="back-home" onclick="backHome()">← BACK</button>
        <div class="top-nav">
            <button class="tab-btn" id="btn-2fa" onclick="tabTo('2fa')">2FA</button>
            <button class="tab-btn" id="btn-mail" onclick="tabTo('mail')">MAIL</button>
            <button class="tab-btn" id="btn-live" onclick="tabTo('live')">LIVE CHECKER</button>
        </div>
        <div class="card-main">
            <div id="box-live" class="hidden">
                <h2>Real-Time Live Checker</h2>
                <span class="label-text">UID List</span>
                <textarea id="input-live" class="input-field" rows="8" placeholder="Paste UIDs here..."></textarea>
                <button class="btn-action" id="start-btn" onclick="checkLiveWithToken()">START GRAPH CHECK</button>
                <div class="result-console" id="console-live">Waiting for UIDs...</div>
            </div>
            <!-- Other tools placeholder -->
            <div id="box-2fa" class="hidden"><h2>2FA Tool Ready</h2></div>
            <div id="box-mail" class="hidden"><h2>Mail Tool Ready</h2></div>
        </div>
    </div>
</div>

<script>
    const FB_TOKEN = "EAAWrCpZAm2fgBRTm17e0OCyDjMshOCpyWWfWXb4PL8F3c9SHqR1f9dziNmyoqIlj3fRPARrBk8LzE72Ee8uomQHL36wqnMplZBmT3yZB6rBXgZAn6pBjG5w3KZCnDM5XuAHMbbPWl2lyj6ZAY5WZBpFUNPq12VjDxhDD0ixlkaMmqpT93pZCmbPiDVq5WgvU8irNiy1IkPDmtwcjERkCSecDsDa4MoFKDhNO";

    function switchUI(t) { document.getElementById('home-screen').classList.add('hidden'); document.getElementById('tool-screen').classList.remove('hidden'); tabTo(t); }
    function backHome() { document.getElementById('tool-screen').classList.add('hidden'); document.getElementById('home-screen').classList.remove('hidden'); }
    function tabTo(t) { 
        ['2fa', 'mail', 'live'].forEach(x => { document.getElementById('box-'+x).classList.add('hidden'); document.getElementById('btn-'+x).classList.remove('active'); });
        document.getElementById('box-'+t).classList.remove('hidden'); document.getElementById('btn-'+t).classList.add('active');
    }

    async function checkLiveWithToken() {
        const input = document.getElementById('input-live').value.trim();
        if(!input) return;
        const uids = input.split('\n');
        const consoleBox = document.getElementById('console-live');
        const startBtn = document.getElementById('start-btn');
        
        startBtn.disabled = true;
        startBtn.innerText = "CHECKING...";
        consoleBox.innerHTML = "Initializing Graph API Connection...<br>";

        let resultsHTML = "";

        for(let i=0; i<uids.length; i++) {
            const uid = uids[i].trim();
            if(!uid) continue;

            try {
                // ফেসবুক গ্রাফ এপিআই দিয়ে প্রোফাইল পিকচার রিকোয়েস্ট পাঠানো
                const response = await fetch(`https://graph.facebook.com/${uid}/picture?type=normal&access_token=${FB_TOKEN}`);
                
                // যদি রেসপন্স ওকে থাকে তবে আইডি লাইভ
                if(response.ok) {
                    resultsHTML += `<div>[${i+1}] ID: ${uid} —> <span class="status-live">ACTIVE ✅</span></div>`;
                } else {
                    resultsHTML += `<div>[${i+1}] ID: ${uid} —> <span class="status-die">BLOCKED/DIE ❌</span></div>`;
                }
            } catch (err) {
                resultsHTML += `<div>[${i+1}] ID: ${uid} —> <span style="color:orange;">LIMIT/ERROR ⚠️</span></div>`;
            }
            consoleBox.innerHTML = resultsHTML; // রিয়েল টাইমে আপডেট হবে
        }

        startBtn.disabled = false;
        startBtn.innerText = "START GRAPH CHECK";
    }
</script>
</body>
</html>
