<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Longisir VIP Portal</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    /* ... (আপনার আগের CSS গুলো এখানে থাকবে) ... */
    /* নতুন টুলের জন্য CSS ক্লাস */
    .neon-card { background: rgba(15, 23, 42, 0.95); border: 1px solid rgba(51, 65, 85, 0.5); box-shadow: 0 25px 70px -10px rgba(0, 0, 0, 0.8); border-radius: 28px; }
    .neon-bracket { border-left: 3px solid #6366f1; border-right: 3px solid #6366f1; border-radius: 14px; }
</style>
</head>
<body class="bg-[#0a0b12] text-white">

<div id="tool-mail" class="section">
    <div class="tool-wrapper p-4 flex justify-center items-center min-h-screen">
        <div class="w-full max-w-4xl neon-card p-8 flex flex-col justify-between">
            <div class="flex flex-col items-center mb-8 border-b border-slate-800 pb-5">
                <h1 class="text-3xl font-black text-indigo-400">FB & IG OTP Extractor</h1>
                <p class="text-[10px] text-indigo-400/70 uppercase tracking-widest mt-1">Cloud Automation Hub</p>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-5">
                    <div class="bg-slate-950 p-1.5 rounded-2xl flex space-x-1.5 border border-slate-800">
                        <button onclick="setPlatform('fb')" class="flex-1 bg-indigo-600 py-3 rounded-xl font-black text-xs">FACEBOOK</button>
                        <button onclick="setPlatform('ig')" class="flex-1 bg-transparent py-3 rounded-xl font-bold text-xs">INSTAGRAM</button>
                    </div>
                    <div class="neon-bracket p-4">
                        <textarea id="rawData" class="w-full h-32 bg-slate-900 border-none focus:ring-0 text-cyan-400 font-mono text-xs" placeholder="email|password|refresh_token|client_id"></textarea>
                    </div>
                    <button onclick="getOtpCode()" class="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-xl font-black text-xs uppercase tracking-widest">Extract OTP Code</button>
                </div>
                
                <div class="bg-slate-950 p-6 rounded-xl border border-slate-800 flex flex-col justify-center items-center">
                    <span id="codeTitle" class="text-[9px] font-black text-slate-500 uppercase">Verification Code:</span>
                    <span id="otpOutput" class="text-5xl font-black tracking-widest text-slate-700 font-mono my-4">XXXXXX</span>
                </div>
            </div>
            </div>
    </div>
</div>

<script>
    // আপনার আগের সব ফাংশন...
    
    // নতুন টুলের লজিক
    function getOtpCode() {
        const rawData = document.getElementById('rawData').value.trim();
        const otpOutput = document.getElementById('otpOutput');
        
        if (!rawData) { alert('Data needed!'); return; }
        
        otpOutput.innerText = "LOADING...";
        fetch("https://toll-376d.onrender.com/get-code", {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ raw_input: rawData })
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === "success") {
                otpOutput.innerText = data.code;
                otpOutput.style.color = "#34d399"; // Success Green
            } else {
                otpOutput.innerText = "ERROR";
                otpOutput.style.color = "#f43f5e"; // Error Red
            }
        })
        .catch(() => {
            otpOutput.innerText = "OFFLINE";
        });
    }
</script>
</body>
</html>
