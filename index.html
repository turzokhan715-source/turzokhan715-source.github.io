<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FB & IG OTP Extractor</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .premium-card {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border-radius: 32px;
        }
        .inner-box {
            border-radius: 16px;
        }
        /* আপনার পিকের মতো সেই কাস্টম থিক কার্ভ ব্র্যাকেট ডিজাইন */
        .custom-bracket {
            border-left: 3px solid #0f172a;
            border-right: 3px solid #0f172a;
            border-radius: 12px;
        }
    </style>
</head>
<body class="bg-[#f1f5f9] text-slate-800 min-h-screen flex flex-col justify-center items-center p-6 font-sans select-none">

    <div class="w-full max-w-lg bg-white premium-card border border-slate-100 p-8 min-h-[820px] flex flex-col justify-between transition-all duration-300">
        
        <div>
            <div class="flex flex-col items-center mb-6">
                <div class="flex items-center space-x-3 text-3xl font-black text-slate-800 tracking-tight">
                    <i class="fas fa-shopping-bag text-indigo-600 text-2xl"></i>
                    <h1 id="mainTitle" class="text-2xl font-black bg-gradient-to-r from-slate-900 to-indigo-950 bg-clip-text text-transparent">FB & IG OTP Extractor</h1>
                </div>
                <p class="text-xs text-slate-400 font-semibold mt-1">Facebook & Instagram Verification Code Extractor</p>
                
                <div id="modeBadge" class="mt-3 inline-flex items-center space-x-1.5 bg-amber-50 border border-amber-200/60 px-5 py-1 rounded-full shadow-sm">
                    <i class="fas fa-star text-amber-500 text-[10px]"></i>
                    <span id="badgeText" class="text-[11px] font-extrabold text-amber-700 tracking-wide uppercase">Facebook Priority Mode</span>
                </div>
            </div>

            <div class="mb-5 bg-slate-100 p-1.5 inner-box flex space-x-1 border border-slate-200/50">
                <button onclick="setPlatform('fb')" id="fbBtn" class="flex-1 bg-blue-600 text-white text-xs font-black py-3 px-4 rounded-xl flex justify-center items-center transition-all duration-200 shadow-sm cursor-pointer">
                    <i class="fas fa-book-bookmark mr-2 text-xs"></i> Facebook
                    <span class="ml-1.5 bg-amber-400 text-slate-900 text-[9px] font-black px-1.5 py-0.5 rounded-md">1st</span>
                </button>
                <button onclick="setPlatform('ig')" id="igBtn" class="flex-1 bg-transparent text-slate-400 hover:text-slate-600 text-xs font-bold py-3 px-4 rounded-xl flex justify-center items-center transition-all duration-200 cursor-pointer">
                    <i class="fas fa-camera mr-2 text-xs"></i> Instagram
                    <span class="ml-1.5 bg-slate-200 text-slate-500 text-[9px] font-bold px-1.5 py-0.5 rounded-md">2nd</span>
                </button>
            </div>

            <div class="mb-5 flex space-x-2">
                <button onclick="loadAccount(1)" class="flex-1 bg-slate-50 hover:bg-slate-100 text-slate-600 text-xs font-bold py-2.5 px-3 inner-box border border-slate-200/80 transition cursor-pointer flex justify-center items-center shadow-xs">
                    <i class="fas fa-user-circle mr-1.5 text-blue-500"></i> Account 1
                </button>
                <button onclick="loadAccount(2)" class="flex-1 bg-slate-50 hover:bg-slate-100 text-slate-600 text-xs font-bold py-2.5 px-3 inner-box border border-slate-200/80 transition cursor-pointer flex justify-center items-center shadow-xs">
                    <i class="fas fa-user-circle mr-1.5 text-purple-500"></i> Account 2
                </button>
            </div>

            <div class="mb-5 relative px-4 custom-bracket">
                <label class="block text-xs font-extrabold text-slate-700 tracking-wide mb-2 uppercase">
                    📋 Paste Your Email Data Here:
                </label>
                <textarea 
                    id="rawData" 
                    class="w-full h-24 bg-white border border-slate-200 inner-box p-3 text-xs font-mono text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 shadow-inner transition"
                    placeholder="email|password|refresh_token|client_id"
                ></textarea>
            </div>

            <div class="flex space-x-2 mb-6">
                <button onclick="getOtpCode()" id="actionBtn" class="flex-[2] bg-slate-100 hover:bg-slate-200 text-slate-600 font-extrabold py-3.5 px-4 inner-box border border-slate-200 transition-all duration-200 flex justify-center items-center cursor-pointer text-xs tracking-wider uppercase">
                    <span id="btnText"><i class="fas fa-search mr-2"></i> Extract OTP Code</span>
                </button>
                <button onclick="clearAll()" class="flex-1 bg-slate-50 hover:bg-slate-100 text-slate-400 font-bold py-3.5 px-4 inner-box border border-slate-200 transition flex justify-center items-center cursor-pointer text-xs uppercase">
                    <i class="fas fa-trash-alt mr-1.5"></i> Clear
                </button>
            </div>
        </div>

        <div id="resultBox" class="border border-emerald-100 rounded-2xl p-5 bg-emerald-50/50 mt-auto">
            
            <div id="detectInfo" class="px-4 custom-bracket mb-4 flex justify-between items-center bg-white/40 py-2.5 rounded-xl border border-slate-100 shadow-xs">
                <div>
                    <div class="flex items-center text-xs font-black text-emerald-800 tracking-wide">
                        <i id="statusDot" class="fas fa-check-circle mr-1.5 text-emerald-500 text-sm"></i>
                        <span id="successMsg">System Standing By</span>
                    </div>
                    <div class="text-[11px] text-slate-500 mt-1 font-mono break-all max-w-[280px]">
                        Mail: <span id="displayEmail" class="text-slate-700 font-bold">No Account Loaded</span>
                    </div>
                </div>
                <button onclick="copyEmail()" id="copyEmailBtn" class="bg-indigo-50 text-indigo-600 hover:bg-indigo-100 border border-indigo-200/50 px-3 py-2 rounded-xl text-[11px] font-black transition cursor-pointer flex items-center shadow-2xs">
                    <i class="fas fa-envelope mr-1"></i> Copy Email
                </button>
            </div>

            <div class="bg-white p-4 inner-box border border-emerald-100 flex items-center justify-between shadow-xs">
                <div>
                    <span id="codeTitle" class="text-[10px] font-bold text-slate-400 block mb-1 uppercase tracking-wider">Verification Code:</span>
                    <span id="otpOutput" class="text-5xl font-black tracking-widest text-emerald-500 font-mono">XXXXXX</span>
                </div>
                <button onclick="copyCode()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl text-xs font-black transition-all cursor-pointer shadow-sm flex items-center">
                    <i class="fas fa-copy mr-1.5"></i> Copy Code
                </button>
            </div>
        </div>

    </div>

    <script>
        let currentPlatform = 'fb';

        // ⚠️ আপনার অ্যাকাউন্টের ডাটাগুলো এখানে সেট করে রাখতে পারেন
        const account1_data = "email1@outlook.com|pass1|refresh_token_1|client_id_1";
        const account2_data = "email2@outlook.com|pass2|refresh_token_2|client_id_2";

        // ইনপুট টাইপ করার সাথে সাথেই লাইভ ইমেইল স্ক্রিনে সেট করার লজিক
        document.getElementById('rawData').addEventListener('input', function(e) {
            const val = e.target.value.trim();
            document.getElementById('displayEmail').innerText = val.includes('|') ? val.split('|')[0] : "No Account Loaded";
        });

        function setPlatform(platform) {
            currentPlatform = platform;
            const fbBtn = document.getElementById('fbBtn');
            const igBtn = document.getElementById('igBtn');
            const modeBadge = document.getElementById('modeBadge');
            const badgeText = document.getElementById('badgeText');

            if(platform === 'fb') {
                fbBtn.className = "flex-1 bg-blue-600 text-white text-xs font-black py-3 px-4 rounded-xl flex justify-center items-center transition-all duration-200 shadow-sm cursor-pointer";
                igBtn.className = "flex-1 bg-transparent text-slate-400 hover:text-slate-600 text-xs font-bold py-3 px-4 rounded-xl flex justify-center items-center transition-all duration-200 cursor-pointer";
                modeBadge.className = "mt-3 inline-flex items-center space-x-1.5 bg-amber-50 border border-amber-200/60 px-5 py-1 rounded-full shadow-sm";
                badgeText.className = "text-[11px] font-extrabold text-amber-700 tracking-wide uppercase";
                badgeText.innerText = "Facebook Priority Mode";
            } else {
                igBtn.className = "flex-1 bg-gradient-to-r from-purple-600 via-pink-500 to-orange-400 text-white text-xs font-black py-3 px-4 rounded-xl flex justify-center items-center transition-all duration-200 shadow-sm cursor-pointer";
                fbBtn.className = "flex-1 bg-transparent text-slate-400 hover:text-slate-600 text-xs font-bold py-3 px-4 rounded-xl flex justify-center items-center transition-all duration-200 cursor-pointer";
                modeBadge.className = "mt-3 inline-flex items-center space-x-1.5 bg-purple-50 border border-purple-200/60 px-5 py-1 rounded-full shadow-sm";
                badgeText.className = "text-[11px] font-extrabold text-purple-700 tracking-wide uppercase";
                badgeText.innerText = "Instagram Priority Mode";
            }
        }

        function loadAccount(num) {
            const data = num === 1 ? account1_data : account2_data;
            document.getElementById('rawData').value = data;
            document.getElementById('displayEmail').innerText = data.includes('|') ? data.split('|')[0] : "No Account Loaded";
        }

        function clearAll() {
            document.getElementById('rawData').value = "";
            document.getElementById('displayEmail').innerText = "No Account Loaded";
            document.getElementById('otpOutput').innerText = "XXXXXX";
            document.getElementById('otpOutput').className = "text-5xl font-black tracking-widest text-emerald-500 font-mono";
            document.getElementById('successMsg').innerText = "System Standing By";
            document.getElementById('statusDot').className = "fas fa-check-circle mr-1.5 text-emerald-500 text-sm";
        }

        async function getOtpCode() {
            const rawInput = document.getElementById('rawData').value.trim();
            const actionBtn = document.getElementById('actionBtn');
            const btnText = document.getElementById('btnText');
            const otpOutput = document.getElementById('otpOutput');
            const successMsg = document.getElementById('successMsg');
            const statusDot = document.getElementById('statusDot');

            if(!rawInput) {
                alert('Please enter or select account data line!');
                return;
            }

            actionBtn.disabled = true;
            actionBtn.className = "flex-[2] bg-indigo-600 text-white font-extrabold py-3.5 px-4 inner-box transition-all duration-200 flex justify-center items-center text-xs tracking-wider uppercase shadow-md";
            btnText.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Extracting...';
            
            successMsg.innerText = "Exchanging API Session Token...";
            statusDot.className = "fas fa-circle-notch fa-spin mr-1.5 text-amber-500 text-sm";
            otpOutput.innerText = "XXXXXX";
            otpOutput.className = "text-5xl font-black tracking-widest text-slate-300 font-mono";

            try {
                // ⚠️ আপনার Render এর লাইভ এপিআই ইউআরএল এখানে বসাবেন
                const API_URL = "https://fb-code-api.onrender.com/get-code"; 

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ raw_input: rawInput, mode: currentPlatform })
                });
                const data = await response.json();

                resetButton();

                if(data.status === 'success') {
                    successMsg.innerText = "Email Retrieved Successfully";
                    statusDot.className = "fas fa-check-circle mr-1.5 text-emerald-500 text-sm";
                    otpOutput.innerText = data.code;
                    otpOutput.className = "text-5xl font-black tracking-widest text-emerald-500 font-mono";
                } else {
                    successMsg.innerText = "Verification Failed";
                    statusDot.className = "fas fa-times-circle mr-1.5 text-red-500 text-sm";
                    otpOutput.innerText = "FAILED";
                    otpOutput.className = "text-2xl font-black text-red-500 font-sans";
                }
            } catch (err) {
                resetButton();
                successMsg.innerText = "Server Sleeping / Error";
                statusDot.className = "fas fa-exclamation-triangle mr-1.5 text-amber-500 text-sm";
                otpOutput.innerText = "RETRY";
                otpOutput.className = "text-2xl font-black text-amber-500 font-sans";
            }
        }

        function resetButton() {
            const actionBtn = document.getElementById('actionBtn');
            const btnText = document.getElementById('btnText');
            actionBtn.disabled = false;
            actionBtn.className = "flex-[2] bg-slate-100 hover:bg-slate-200 text-slate-600 font-extrabold py-3.5 px-4 inner-box border border-slate-200 transition-all duration-200 flex justify-center items-center cursor-pointer text-xs tracking-wider uppercase";
            btnText.innerHTML = '<i class="fas fa-search mr-2"></i> Extract OTP Code';
        }

        function copyCode() {
            const text = document.getElementById('otpOutput').innerText;
            if(text && text !== 'XXXXXX' && text !== 'FAILED' && text !== 'RETRY') {
                navigator.clipboard.writeText(text);
                alert('Verification Code Copied!');
            }
        }

        function copyEmail() {
            const emailText = document.getElementById('displayEmail').innerText;
            if(emailText && emailText !== 'No Account Loaded') {
                navigator.clipboard.writeText(emailText);
                alert('Email Copied to Clipboard!');
            } else {
                alert('No Email available to copy!');
            }
        }
    </script>
</body>
</html>
