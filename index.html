<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FB LIVE CHECKER - FIXED COLORS</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
body { background: #0a0a0a; color: #ffffff; display: flex; height: 100vh; overflow: hidden; }

/* Left Panel */
.left-panel { 
    width: 300px; 
    background: #151515; 
    padding: 15px; 
    display: flex; 
    flex-direction: column; 
    border-right: 1px solid #333333; 
}
.panel-header { 
    background: #0088ff; 
    padding: 10px 15px; 
    border-radius: 5px; 
    margin-bottom: 10px; 
    font-size: 13px; 
    font-weight: bold;
    color: #ffffff; 
    text-align: center;
}
.token-input { 
    width: 100%; 
    background: #202020; 
    border: 1px solid #333333; 
    border-radius: 5px; 
    padding: 8px; 
    color: #ffffff; 
    font-family: 'Courier New', monospace; 
    font-size: 11px; 
    outline: none; 
    margin-bottom: 10px;
}
.account-list { 
    flex: 1; 
    background: #202020; 
    border: 1px solid #333333; 
    border-radius: 5px; 
    padding: 10px; 
    overflow-y: auto; 
    font-family: 'Courier New', monospace; 
    font-size: 11px; 
    color: #00ff00; 
    margin-bottom: 10px;
    outline: none;
}
.btn-group { display: flex; gap: 10px; }
.btn { 
    flex: 1; 
    padding: 12px; 
    border: none; 
    border-radius: 5px; 
    font-weight: bold; 
    cursor: pointer; 
    font-size: 13px; 
}
.btn-clear { background: #ff4444; color: #ffffff; }
.btn-check { background: #0088ff; color: #ffffff; }

/* Middle Panel */
.middle-panel { 
    flex: 1; 
    background: #0a0a0a; 
    padding: 15px; 
    display: flex; 
    flex-direction: column; 
}
.status-bar { 
    background: #151515; 
    padding: 10px 15px; 
    border-radius: 5px; 
    margin-bottom: 10px; 
    font-size: 12px; 
    color: #aaaaaa; 
    display: flex; 
    justify-content: space-between; 
}
.result-container { 
    flex: 1; 
    background: #151515; 
    border: 1px solid #333333; 
    border-radius: 5px; 
    padding: 10px; 
    overflow-y: auto; 
}
.result-item { 
    padding: 8px; 
    margin-bottom: 5px; 
    border-radius: 4px; 
    display: flex; 
    justify-content: space-between; 
    font-family: monospace;
}
.result-active { background: rgba(0, 255, 0, 0.1); border-left: 4px solid #00ff00; color: #00ff00; }
.result-blocked { background: rgba(255, 0, 0, 0.1); border-left: 4px solid #ff4444; color: #ff4444; }

/* Footer */
.progress-footer { 
    background: #151515; 
    padding: 12px; 
    border-radius: 5px; 
    margin-top: 10px; 
    display: flex; 
    align-items: center; 
}
.progress-bar { 
    flex: 1; 
    height: 10px; 
    background: #333333; 
    border-radius: 5px; 
    margin: 0 15px; 
    overflow: hidden; 
}
.progress-fill { height: 100%; background: #0088ff; width: 0%; transition: 0.3s; }
.btn-export { background: #222222; color: #0088ff; border: 1px solid #0088ff; padding: 8px 15px; border-radius: 4px; cursor: pointer; }

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-thumb { background: #333333; border-radius: 4px; }
</style>
</head>
<body>

<div class="left-panel">
    <div class="panel-header">LIVE CHECKER</div>
    <input type="text" id="token-input" class="token-input" placeholder="Enter Access Token...">
    <div id="account-list" class="account-list" contenteditable="true"></div>
    <div class="btn-group">
        <button class="btn btn-clear" onclick="location.reload()">Clear</button>
        <button class="btn btn-check" onclick="startCheck()">Check</button>
    </div>
</div>

<div class="middle-panel">
    <div class="status-bar">
        <span>Status: <span id="timer">00:00</span></span>
        <span>Active: <span id="active-count" style="color:#00ff00">0</span> | Blocked: <span id="blocked-count" style="color:#ff4444">0</span></span>
    </div>
    <div class="result-container" id="result-container"></div>
    <div class="progress-footer">
        <span id="prog-text">0%</span>
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        <button class="btn-export">Export</button>
    </div>
</div>

<script>
// এখানে আগের লজিকগুলো থাকবে
function startCheck() {
    let list = document.getElementById('account-list').innerText.split('\n').filter(i => i.trim() !== "");
    if(list.length === 0) return alert("Paste UIDs!");
    
    let index = 0;
    let active = 0;
    let blocked = 0;
    
    function process() {
        if(index >= list.length) return;
        
        let uid = list[index].trim();
        // এটি একটি ডেমো লজিক, রিয়েল চেকিং এর জন্য এপিআই কল লাগবে
        let isActive = Math.random() > 0.5; 
        
        let resDiv = document.createElement('div');
        resDiv.className = isActive ? 'result-item result-active' : 'result-item result-blocked';
        resDiv.innerHTML = `<span>${uid}</span> <span>${isActive ? 'ACTIVE' : 'BLOCKED'}</span>`;
        document.getElementById('result-container').appendChild(resDiv);
        
        if(isActive) active++; else blocked++;
        document.getElementById('active-count').innerText = active;
        document.getElementById('blocked-count').innerText = blocked;
        
        index++;
        let progress = (index / list.length) * 100;
        document.getElementById('progress-fill').style.width = progress + '%';
        document.getElementById('prog-text').innerText = Math.round(progress) + '%';
        
        setTimeout(process, 300);
    }
    process();
}
</script>
</body>
</html>
