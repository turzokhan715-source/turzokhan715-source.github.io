<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LONGISIR - 2FA Live Checker & Token Extractor</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        /* Custom Scrollbar for modern look */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1f2937;
        }
        ::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3b82f6;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col font-sans">

    <nav class="bg-gray-800 border-b border-gray-700 px-6 py-4 flex items-center justify-between shadow-lg">
        <div class="flex items-center space-x-3">
            <div class="bg-blue-600 p-2 rounded-lg text-white shadow-md shadow-blue-500/20">
                <i class="fa-solid fa-cube text-xl animate-pulse"></i>
            </div>
            <span class="text-2xl font-black tracking-wider bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">LONGISIR</span>
        </div>
        <div class="flex items-center space-x-4 text-sm text-gray-400">
            <span class="flex items-center"><i class="fa-solid fa-circle text-green-500 text-xs mr-2 animate-ping"></i> System Operational</span>
        </div>
    </nav>

    <main class="flex-1 p-6 max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="lg:col-span-1 flex flex-col space-y-6">
            <div class="bg-gray-800 border border-gray-700 rounded-xl p-5 shadow-xl flex flex-col flex-1">
                <div class="flex items-center justify-between mb-3">
                    <label for="inputData" class="text-sm font-semibold text-gray-300 flex items-center">
                        <i class="fa-solid fa-clipboard-list mr-2 text-blue-400"></i> Input Accounts Data
                    </label>
                    <span id="accountCount" class="text-xs bg-gray-700 px-2 py-1 rounded text-gray-400 font-mono">0 Accounts</span>
                </div>
                <textarea id="inputData" placeholder="Paste your accounts here...&#10;Format support:&#10;UID|PASS|2FA&#10;UID,PASS,2FA&#10;UID pass 2fa" class="w-full flex-1 bg-gray-950 border border-gray-700 rounded-lg p-3 text-sm font-mono text-green-400 placeholder-gray-600 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 resize-none min-h-[300px]"></textarea>
                
                <div class="grid grid-cols-2 gap-3 mt-4">
                    <button id="btnStart" class="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-medium py-2.5 px-4 rounded-lg shadow-lg shadow-blue-500/10 transition-all active:scale-95 flex items-center justify-center cursor-pointer">
                        <i class="fa-solid fa-play mr-2 text-sm"></i> Start Process
                    </button>
                    <button id="btnStop" disabled class="bg-gray-700 text-gray-400 font-medium py-2.5 px-4 rounded-lg transition-all flex items-center justify-center cursor-not-allowed">
                        <i class="fa-solid fa-stop mr-2 text-sm"></i> Stop
                    </button>
                </div>
                <button id="btnClear" class="w-full mt-2 bg-gray-900 hover:bg-gray-950 text-gray-400 hover:text-gray-200 border border-gray-700 py-2 rounded-lg text-sm transition-all flex items-center justify-center cursor-pointer">
                    <i class="fa-solid fa-trash-can mr-2 text-xs"></i> Clear Input
                </button>
            </div>
        </div>

        <div class="lg:col-span-2 flex flex-col space-y-6">
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
                <div class="bg-gray-800 border border-gray-700 rounded-xl p-4 shadow-md flex flex-col items-center justify-center">
                    <span class="text-xs text-gray-400 font-medium tracking-wider uppercase mb-1">Total Loaded</span>
                    <span id="statTotal" class="text-2xl font-bold font-mono text-gray-200">0</span>
                </div>
                <div class="bg-gray-800 border border-gray-700 rounded-xl p-4 shadow-md flex flex-col items-center justify-center border-l-4 border-l-green-500">
                    <span class="text-xs text-green-400 font-medium tracking-wider uppercase mb-1">Live/Success</span>
                    <span id="statLive" class="text-2xl font-bold font-mono text-green-400">0</span>
                </div>
                <div class="bg-gray-800 border border-gray-700 rounded-xl p-4 shadow-md flex flex-col items-center justify-center border-l-4 border-l-yellow-500">
                    <span class="text-xs text-yellow-500 font-medium tracking-wider uppercase mb-1">2FA/Checkpoint</span>
                    <span id="stat2FA" class="text-2xl font-bold font-mono text-yellow-500">0</span>
                </div>
                <div class="bg-gray-800 border border-gray-700 rounded-xl p-4 shadow-md flex flex-col items-center justify-center border-l-4 border-l-red-500">
                    <span class="text-xs text-red-400 font-medium tracking-wider uppercase mb-1">Dead/Failed</span>
                    <span id="statDead" class="text-2xl font-bold font-mono text-red-400">0</span>
                </div>
            </div>

            <div class="bg-gray-800 border border-gray-700 rounded-xl shadow-xl flex flex-col flex-1 overflow-hidden min-h-[400px]">
                <div class="px-5 py-4 border-b border-gray-700 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 bg-gray-800/50">
                    <h3 class="font-semibold text-gray-200 flex items-center">
                        <i class="fa-solid fa-list-check mr-2 text-indigo-400"></i> Processed Results
                    </h3>
                    <div class="flex items-center space-x-2">
                        <button id="btnExport" class="bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-medium py-1.5 px-3 rounded-md shadow transition-all flex items-center cursor-pointer">
                            <i class="fa-solid fa-file-excel mr-1.5"></i> Export to Google Sheet (CSV)
                        </button>
                    </div>
                </div>

                <div class="flex-1 overflow-auto max-h-[500px]">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-gray-900/80 sticky top-0 border-b border-gray-700 text-xs font-semibold uppercase text-gray-400 tracking-wider">
                            <tr>
                                <th class="py-3 px-4">#</th>
                                <th class="py-3 px-4">UID / Username</th>
                                <th class="py-3 px-4">Password</th>
                                <th class="py-3 px-4">2FA Key / Token</th>
                                <th class="py-3 px-4 text-center">Status</th>
                            </tr>
                        </thead>
                        <tbody id="resultsTable" class="text-sm font-mono divide-y divide-gray-700/50">
                            <tr id="emptyRow">
                                <td colspan="5" class="py-10 text-center text-gray-500 font-sans italic">
                                    No data processed yet. Paste accounts and click Start.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-gray-950 border-t border-gray-800 px-6 py-3 text-center text-xs text-gray-600">
        &copy; 2026 LONGISIR. Advanced Multi-threaded Automation Workspace.
    </footer>

    <script>
        // DOM Elements
        const inputData = document.getElementById('inputData');
        const accountCount = document.getElementById('accountCount');
        const btnStart = document.getElementById('btnStart');
        const btnStop = document.getElementById('btnStop');
        const btnClear = document.getElementById('btnClear');
        const btnExport = document.getElementById('btnExport');
        const resultsTable = document.getElementById('resultsTable');
        const emptyRow = document.getElementById('emptyRow');

        // Stat Elements
        const statTotal = document.getElementById('statTotal');
        const statLive = document.getElementById('statLive');
        const stat2FA = document.getElementById('stat2FA');
        const statDead = document.getElementById('statDead');

        // Application State
        let isRunning = false;
        let processedData = [];
        let stats = { total: 0, live: 0, twofa: 0, dead: 0 };
        let processTimeout = null;

        // Dynamic Line Counter Listener
        inputData.addEventListener('input', () => {
            const lines = parseInputLines();
            accountCount.textContent = `${lines.length} Account${lines.length !== 1 ? 's' : ''}`;
        });

        // Clear input field
        btnClear.addEventListener('click', () => {
            if(isRunning) return;
            inputData.value = '';
            accountCount.textContent = '0 Accounts';
        });

        // Parse input lines safely splitting by delimiters
        function parseInputLines() {
            const text = inputData.value.trim();
            if (!text) return [];
            return text.split('\n').map(line => line.trim()).filter(line => line.length > 0);
        }

        // Start processing logic
        btnStart.addEventListener('click', () => {
            const rawLines = parseInputLines();
            if (rawLines.length === 0) {
                alert('Please paste some account credentials first!');
                return;
            }

            // Reset UI States
            isRunning = true;
            processedData = [];
            stats = { total: rawLines.length, live: 0, twofa: 0, dead: 0 };
            updateStatsUI();
            
            // Toggle Buttons
            btnStart.disabled = true;
            btnStart.className = "bg-gray-700 text-gray-400 font-medium py-2.5 px-4 rounded-lg transition-all flex items-center justify-center cursor-not-allowed";
            btnStop.disabled = false;
            btnStop.className = "bg-red-600 hover:bg-red-700 text-white font-medium py-2.5 px-4 rounded-lg shadow-lg shadow-red-500/10 transition-all active:scale-95 flex items-center justify-center cursor-pointer";
            btnClear.disabled = true;

            // Clear previous table entries
            resultsTable.innerHTML = '';

            // Simulate parsing and sequential API / check simulation
            let index = 0;
            function processNext() {
                if (!isRunning || index >= rawLines.length) {
                    endProcessing();
                    return;
                }

                const currentLine = rawLines[index];
                // Support multiple formats: pipe, comma, space, tab
                const parts = currentLine.split(/[|,\s\t]+/).filter(p => p.length > 0);
                
                const uid = parts[0] || 'Unknown_UID';
                const pass = parts[1] || '-------';
                const twofa = parts[2] || '-------';

                // Simulate random check status outcome
                const rand = Math.random();
                let status = 'Dead';
                if (rand > 0.6) status = 'Live';
                else if (rand > 0.35) status = '2FA';

                // Increment inside state counter
                if (status === 'Live') stats.live++;
                else if (status === '2FA') stats.twofa++;
                else stats.dead++;
                updateStatsUI();

                // Save clean data object globally for export
                processedData.push({ uid, pass, twofa, status });

                // Render dynamically onto table body
                appendTableRow(index + 1, uid, pass, twofa, status);

                index++;
                // Continuous iteration cycle simulation (200ms interval delays)
                processTimeout = setTimeout(processNext, 200);
            }

            processNext();
        });

        // Stop processing execution
        btnStop.addEventListener('click', () => {
            if (!isRunning) return;
            isRunning = false;
            if (processTimeout) clearTimeout(processTimeout);
            endProcessing();
        });

        function endProcessing() {
            isRunning = false;
            btnStart.disabled = false;
            btnStart.className = "bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-medium py-2.5 px-4 rounded-lg shadow-lg shadow-blue-500/10 transition-all active:scale-95 flex items-center justify-center cursor-pointer";
            btnStop.disabled = true;
            btnStop.className = "bg-gray-700 text-gray-400 font-medium py-2.5 px-4 rounded-lg transition-all flex items-center justify-center cursor-not-allowed";
            btnClear.disabled = false;
            if(resultsTable.children.length === 0) {
                resultsTable.appendChild(emptyRow);
            }
        }

        function updateStatsUI() {
            statTotal.textContent = stats.total;
            statLive.textContent = stats.live;
            stat2FA.textContent = stats.twofa;
            statDead.textContent = stats.dead;
        }

        function appendTableRow(num, uid, pass, twofa, status) {
            const tr = document.createElement('tr');
            tr.className = "hover:bg-gray-800/40 transition-colors";

            let statusBadge = '';
            if (status === 'Live') {
                statusBadge = '<span class="bg-green-500/10 text-green-400 border border-green-500/20 text-xs px-2.5 py-1 rounded-full font-sans font-semibold shadow-sm">Live / Success</span>';
            } else if (status === '2FA') {
                statusBadge = '<span class="bg-yellow-500/10 text-yellow-400 border border-yellow-500/20 text-xs px-2.5 py-1 rounded-full font-sans font-semibold shadow-sm">2FA Checkpoint</span>';
            } else {
                statusBadge = '<span class="bg-red-500/10 text-red-400 border border-red-500/20 text-xs px-2.5 py-1 rounded-full font-sans font-semibold shadow-sm">Dead / Failed</span>';
            }

            tr.innerHTML = `
                <td class="py-3 px-4 text-gray-500 font-sans text-xs">${num}</td>
                <td class="py-3 px-4 text-gray-200 select-all font-semibold">${uid}</td>
                <td class="py-3 px-4 text-gray-400 select-all">${pass}</td>
                <td class="py-3 px-4 text-blue-400 select-all text-xs font-bold tracking-wider">${twofa}</td>
                <td class="py-3 px-4 text-center">${statusBadge}</td>
            `;
            resultsTable.appendChild(tr);
            
            // Auto scroll down to view incoming records
            tr.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // ==========================================
        // আপডেটেড গুগল শিট (CSV) ডাউনলোড ফাংশন
        // ==========================================
        btnExport.addEventListener('click', () => {
            if (processedData.length === 0) {
                alert('No processed accounts available to export!');
                return;
            }

            // প্রথম লাইনে গুগল শিটের কলাম হেডার
            let csvContent = "UID,Password,2FA Key,Status\n";

            processedData.forEach(item => {
                // কমা বা ডাবল কোটেশন থাকলে সেটিকে গুগল শিটের সেফ ফরম্যাটে নেওয়া
                let cleanUid = item.uid.replace(/"/g, '""');
                let cleanPass = item.pass.replace(/"/g, '""');
                let cleanTwofa = item.twofa.replace(/"/g, '""');
                let cleanStatus = item.status.replace(/"/g, '""');

                // প্রতিটি আইটেমকে ডাবল কোটেশনের মধ্যে কমা দিয়ে আলাদা করা হলো
                // এর ফলে কোনো বাড়তি কমা বা ফুলস্টপ ডেটার টেক্সটের ভেতরে আসবে না
                csvContent += `"${cleanUid}","${cleanPass}","${cleanTwofa}","${cleanStatus}"\n`;
            });

            // এক্সেল এবং গুগল শিটের বাংলা/বিশেষ ক্যারেক্টার সাপোর্ট করার জন্য BOM যোগ করা হয়েছে
            const BOM = "\uFEFF";
            const blob = new Blob([BOM + csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", "2fa_live_checker_results.csv");
            document.body.appendChild(link);
            
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
