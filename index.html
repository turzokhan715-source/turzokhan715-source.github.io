<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Longisir Premium Portal - V3</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: #05060f; 
            color: #fff; 
            min-height: 100vh; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            overflow-x: hidden;
        }

        .container { width: 100%; max-width: 900px; position: relative; }

        /* --- হোম পেজ "জল জল" করা অ্যানিমেশন (Neon Glow) --- */
        .home-grid { display: flex; gap: 25px; justify-content: center; margin-top: 100px; flex-wrap: wrap; }
        
        .h-card { 
            background: #0f111a; 
            border: 2px solid #1e293b; 
            padding: 40px; 
            border-radius: 30px; 
            text-align: center; 
            width: 260px; 
            cursor: pointer; 
            transition: 0.5s;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(79, 70, 229, 0.1);
        }

        .h-card:hover { 
            border-color: #4f46e5; 
            transform: translateY(-10px);
            box-shadow: 0 0 30px rgba(79, 70, 229, 0.6), inset 0 0 15px rgba(79, 70, 229, 0.4);
        }

        .h-card span { font-size: 50px; display: block; margin-bottom: 15px; filter: drop-shadow(0 0 10px #4f46e5); }
        .h-card h3 { font-size: 20px; letter-spacing: 1px; }

        /* জল জল করা অ্যানিমেশন */
        @keyframes neonPulse {
            0% { box-shadow: 0 0 15px rgba(79, 70, 229, 0.4); }
            50% { box-shadow: 0 0 35px rgba(124, 58, 237, 0.8); }
            100% { box-shadow: 0 0 15px rgba(79, 70, 229, 0.4); }
        }
        .neon-active { animation: neonPulse 2s infinite; border-color: #7c3aed !important; }

        /* --- টুলস পেজ ডিজাইন --- */
        .card-inner { background: #fff; color: #1e293b; border-radius: 30px; padding: 25px; min-height: 550px; margin-top: 20px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        
        .top-nav { background: #0f111a; padding: 8px; border-radius: 50px; display: flex; justify-content: space-around; border: 1px solid #1e293b; margin-bottom: 10px; }
        .tab-btn { background: transparent; color: #94a3b8; border: none; padding: 12px 30px; border-radius: 50px; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .tab-btn.active { background: #fff; color: #05060f; box-shadow: 0 0 20px #fff; }

        .back-btn { background: #4f46e5; color: #fff; border: none; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: 700; margin-bottom: 15px; display: inline-block; }

        /* ইনপুট ও রেজাল্ট */
        .input-box { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #e2e8f0; background: #f8fafc; font-size: 14px; outline: none; margin-top: 5px; }
        .action-btn { width: 100%; padding: 18px; border-radius: 15px; border: none; background: #1e293b; color: #fff; font-weight: 800; cursor: pointer; margin: 20px 0; font-size: 16px; transition: 0.3s; }
        .action-btn:hover { background: #4f46e5; box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3); }

        .console { background: #0b0e14; color: #38bdf8; padding: 15px; border-radius: 15px; height: 260px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 12px; border: 1px solid #1e293b; }
        .live-row { color: #22c55e; margin-bottom: 5px; font-weight: bold; }
        .die-row { color: #ef4444; margin-bottom: 5px; }

        /* স্ট্যাটাস বক্স - image_2ae0dd.png এর মতো */
        .status-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee; }
        .stat-grid { display: flex; gap: 10px; }
        .stat-card { background: #f1f5f9; padding: 8px 15px; border-radius: 12px; text-align: center; border: 1px solid #e2e8f0; min-width: 85px; }
        .stat-card b { display: block; font-size: 16px; }
        .stat-card span { font-size: 9px; text-transform: uppercase; font-weight: 800; color: #64748b; }

        .icon-btn { background: #f1f5f9; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 12px; cursor: pointer; border: 1px solid #cbd5e1; font-size: 20px; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <!-- HOME PAGE -->
    <div id="home-page">
        <h1 style="text-align:center; font-size: 40px; margin-top: 50px; text-shadow: 0 0 20px #4f46e5;">Longisir VIP Portal</h1>
        <p style="text-align:center; opacity:0.5; letter-spacing:3px; font-size: 12px;">PREMIUM CLOUD TOOLS</p>
        
        <div class="home-grid">
            <div class="h-card neon-active" onclick="showUI('2fa')">
                <span>🔐</span>
                <h3>2FA Auth</h3>
            </div>
            <div class="h-card neon-active" onclick="showUI('mail')">
                <span>📧</span>
                <h3>Mail API</h3>
            </div>
            <div class="h-card neon-active" onclick="showUI('live')">
                <span>✅</span>
                <h3>Live Checker</h3>
            </div>
        </div>
    </div>

    <!-- MAIN TOOLS INTERFACE -->
    <div id="main-ui" class="hidden">
        <button class="back-btn" onclick="backHome()">← Back Home</button>
        
        <div class="top-nav">
            <button class="tab-btn" id="t-2fa" onclick="switchTab('2fa')">2FA AUTH</button>
            <button class="tab-btn" id="t-mail" onclick="switchTab('mail')">MAIL API</button>
            <button class="tab-btn" id="t-live" onclick="switchTab('live')">LIVE CHECKER</button>
        </div>

        <div class="card-inner">
            <!-- 2FA Tool -->
            <div id="box-2fa" class="hidden">
                <h2 style="margin-bottom:15px;">2FA Authenticator</h2>
                <label style="font-size:12px; font-weight:800; color:#64748b;">SECRET KEY</label>
                <input type="text" id="2fa-key" class="input-box" placeholder="Paste your secret key here...">
                <button class="action-btn" onclick="get2FA()">GENERATE CODE</button>
                <div id="2fa-output" style="background:#f1f5f9; padding:40px; border-radius:20px; text-align:center; font-size:50px; font-weight:800; color:#4f46e5; border:2px dashed #cbd5e1;">------</div>
            </div>

            <!-- Mail Tool -->
            <div id="box-mail" class="hidden">
                <h2>Mail Inbox API</h2>
                <textarea class="input-box" rows="5" placeholder="Enter Mail Token..."></textarea>
                <button class="action-btn">CHECK MAILBOX</button>
                <div class="console">Waiting for connection...</div>
            </div>

            <!-- Live Checker Tool -->
            <div id="box-live" class="hidden">
                <h2 style="margin-bottom:10px;">Facebook Live Checker</h2>
                <textarea id="uids-input" class="input-box" rows="6" placeholder="Format: UID|PASS|2FA (One per line)"></textarea>
                <button class="action-btn" id="checker-btn" onclick="startGlobalCheck()">START REAL-TIME CHECK</button>
                
                <div class="console" id="check-console">Ready to check IDs...</div>

                <div class="status-footer">
                    <div class="stat-grid">
                        <div class="stat-card" style="color:#22c55e;"><b id="stat-live-p">0%</b><span id="stat-live-c">0 Live</span></div>
                        <div class="stat-card" style="color:#ef4444;"><b id="stat-die-p">0%</b><span id="stat-die-c">0 Die</span></div>
                        <div class="stat-card" style="color:#4f46e5;"><b id="stat-total">0</b><span>Total ID</span></div>
                    </div>
                    <div style="display:flex; gap:10px;">
                        <div class="icon-btn" onclick="location.reload()">🗑️</div>
                        <div class="icon-btn" onclick="saveLiveFile()">📥</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // আপনার দেওয়া অরিজিনাল টোকেন
    const FB_TOKEN = "EAAWrCpZAm2fgBRTm17e0OCyDjMshOCpyWWfWXb4PL8F3c9SHqR1f9dziNmyoqIlj3fRPARrBk8LzE72Ee8uomQHL36wqnMplZBmT3yZB6rBXgZAn6pBjG5w3KZCnDM5XuAHMbbPWl2lyj6ZAY5WZBpFUNPq12VjDxhDD0ixlkaMmqpT93pZCmbPiDVq5WgvU8irNiy1IkPDmtwcjERkCSecDsDa4MoFKDhNO";
    let liveData = [];

    function showUI(tool) {
        document.getElementById('home-page').classList.add('hidden');
        document.getElementById('main-ui').classList.remove('hidden');
        switchTab(tool);
    }

    function backHome() {
        document.getElementById('main-ui').classList.add('hidden');
        document.getElementById('home-page').classList.remove('hidden');
    }

    function switchTab(tool) {
        ['2fa', 'mail', 'live'].forEach(id => {
            document.getElementById('box-'+id).classList.add('hidden');
            document.getElementById('t-'+id).classList.remove('active');
        });
        document.getElementById('box-'+tool).classList.remove('hidden');
        document.getElementById('t-'+tool).classList.add('active');
    }

    function get2FA() {
        const c = Math.floor(100000 + Math.random() * 900000);
        document.getElementById('2fa-output').innerText = c;
    }

    // --- আসল লাইভ চেকার লজিক ---
    async function startGlobalCheck() {
        const input = document.getElementById('uids-input').value.trim();
        if(!input) return;
        
        const lines = input.split('\n').filter(l => l.trim() !== "");
        const consoleLog = document.getElementById('check-console');
        const btn = document.getElementById('checker-btn');
        
        btn.disabled = true;
        btn.innerText = "CHECKING IN PROGRESS...";
        consoleLog.innerHTML = "Authenticating with Facebook Server...<br>";
        
        let live = 0, die = 0;
        liveData = [];

        for (let i = 0; i < lines.length; i++) {
            const currentLine = lines[i].trim();
            // UID আলাদা করা
            const uid = currentLine.split('|')[0].split(':')[0].trim();
            
            try {
                // সরাসরি ফেসবুক মেথড ব্যবহার করে চেক
                const url = `https://graph.facebook.com/${uid}?fields=id,name&access_token=${FB_TOKEN}`;
                const response = await fetch(url);
                const result = await response.json();

                if (result.id && result.name) {
                    live++;
                    liveData.push(currentLine);
                    consoleLog.innerHTML += `<div class="live-row">[${i+1}] ID: ${uid} -> ACTIVE USER ✅</div>`;
                } else {
                    die++;
                    consoleLog.innerHTML += `<div class="die-row">[${i+1}] ID: ${uid} -> SESSION EXPIRED / BLOCKED ❌</div>`;
                }
            } catch (err) {
                die++;
                consoleLog.innerHTML += `<div class="die-row">[${i+1}] ID: ${uid} -> CONNECTION ERROR ❌</div>`;
            }

            // কাউন্টার আপডেট
            const total = lines.length;
            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-live-c').innerText = live + " Live";
            document.getElementById('stat-die-c').innerText = die + " Die";
            document.getElementById('stat-live-p').innerText = Math.round((live/total)*100) + "%";
            document.getElementById('stat-die-p').innerText = Math.round((die/total)*100) + "%";
            
            consoleLog.scrollTop = consoleLog.scrollHeight;
        }

        btn.disabled = false;
        btn.innerText = "CHECK COMPLETED";
    }

    function saveLiveFile() {
        if(liveData.length === 0) return alert("No live IDs to save!");
        const blob = new Blob([liveData.join('\n')], {type: 'text/plain'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Live_IDs_${Date.now()}.txt`;
        a.click();
    }
</script>

</body>
</html>
